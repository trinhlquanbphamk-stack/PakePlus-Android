<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模块 II：判断正误舱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .exercise-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .back-nav { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { text-decoration: none; color: var(--color-green); font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }

        /* 分类切换器锚点 */
        .category-filter { display: flex; gap: 10px; }
        .filter-btn { padding: 5px 12px; border: 1px solid var(--border-color); background: #fff; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: var(--transition); }
        .filter-btn.active { background: var(--color-green); color: #fff; border-color: var(--color-green); }

        .question-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 30px; box-shadow: var(--shadow-sm); }
        .q-header { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .q-text { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; text-align: center; padding: 10px 0; }

        /* 双键快刷大按钮区 */
        .tf-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .tf-btn { padding: 18px; border: 2px solid var(--border-color); border-radius: 10px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: var(--transition); background: var(--bg-main); text-align: center; }
        .tf-btn-true:hover { border-color: var(--color-green); color: var(--color-green); background: var(--color-green-light); }
        .tf-btn-false:hover { border-color: var(--color-red); color: var(--color-red); background: var(--color-red-light); }

        .tf-btn.selected-true-correct { background-color: var(--color-green) !important; color: #fff !important; border-color: var(--color-green) !important; }
        .tf-btn.selected-false-correct { background-color: var(--color-green) !important; color: #fff !important; border-color: var(--color-green) !important; }
        .tf-btn.selected-wrong { background-color: var(--color-red) !important; color: #fff !important; border-color: var(--color-red) !important; }
        .tf-btn.disabled { pointer-events: none; opacity: 0.6; }

        /* 考场涂卡映射提示牌（选择后才显现） */
        .card-alert-banner { display: none; background: #fff7ed; border: 1px solid #ffedd5; color: #c2410c; padding: 12px; border-radius: 6px; text-align: center; font-weight: 700; font-size: 1.05rem; margin-bottom: 20px; }

        .analysis-box { margin-top: 20px; background: #f8fafc; border-left: 4px solid var(--color-green); padding: 20px; border-radius: 4px; display: none; }
        .analysis-box h5 { color: var(--color-green); font-size: 0.95rem; margin-bottom: 12px; }

        .action-bar { display: flex; justify-content: flex-end; margin-top: 20px; }
        .btn-next { padding: 10px 24px; background: var(--color-green); color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; visibility: hidden; }
        .btn-next:hover { background: #15803d; }
    </style>
</head>
<body>

    <div class="exercise-container">
        <div class="back-nav">
            <a href="../index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> 返回主控大盘</a>

            <div class="category-filter">
                <button class="filter-btn active" onclick="filterCategory('all', this)">全部</button>
                <button class="filter-btn" onclick="filterCategory('words', this)">词汇篇 (1-20)</button>
                <button class="filter-btn" onclick="filterCategory('sentences', this)">句子篇 (21-35)</button>
                <button class="filter-btn" onclick="filterCategory('paragraphs', this)">篇章篇 (36-45)</button>
            </div>
        </div>

        <div class="question-box">
            <div class="q-header">
                <span id="q-cat"><i class="fa-solid fa-folder-open"></i> 分类加载中...</span>
                <span id="q-index">题目 0 / 0</span>
            </div>

            <div class="q-text" id="q-text">Loading statement...</div>

            <div class="card-alert-banner" id="card-alert"></div>

            <div class="tf-actions">
                <button class="tf-btn tf-btn-true" id="btn-true">TRUE (正确)</button>
                <button class="tf-btn tf-btn-false" id="btn-false">FALSE (错误)</button>
            </div>

            <div class="analysis-box" id="analysis-container">
                <h5><i class="fa-solid fa-comment-medical"></i> 句意全译与考点勘误</h5>
                <p id="analysis-text" style="font-size: 0.92rem; color: #334155; margin-bottom: 12px; line-height: 1.5;"></p>
                <p id="analysis-hook" style="background: #f0fdf4; color: #16a34a; padding: 8px 12px; border-radius: 6px; font-weight: 600; font-size: 0.88rem; border: 1px dashed #bbf7d0;"></p>
            </div>

            <div class="action-bar">
                <button class="btn-next" id="btn-next">下一题 <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script src="../js/question-bank.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        let filteredQuestions = [...trueFalseQuestions];
        let currentIndex = 0;
        let currentQuestion = null;
        let hasAnswered = false;

        const btnTrue = document.getElementById('btn-true');
        const btnFalse = document.getElementById('btn-false');
        const cardAlert = document.getElementById('card-alert');
        const analysisContainer = document.getElementById('analysis-container');
        const analysisText = document.getElementById('analysis-text');
        const analysisHook = document.getElementById('analysis-hook');
        const btnNext = document.getElementById('btn-next');
        const indexNode = document.getElementById('q-index');
        const catNode = document.getElementById('q-cat');
        const textNode = document.getElementById('q-text');

        function filterCategory(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (cat === 'all') {
                filteredQuestions = [...trueFalseQuestions];
            } else {
                filteredQuestions = trueFalseQuestions.filter(q => q.category === cat);
            }
            currentIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            btnNext.style.visibility = 'hidden';
            analysisContainer.style.display = 'none';
            cardAlert.style.display = 'none';

            btnTrue.className = 'tf-btn tf-btn-true';
            btnFalse.className = 'tf-btn tf-btn-false';

            if (filteredQuestions.length === 0) {
                textNode.textContent = "该分类下暂无题目。";
                return;
            }

            currentQuestion = filteredQuestions[currentIndex];

            let catName = currentQuestion.category === 'words' ? '词汇辨析篇' : (currentQuestion.category === 'sentences' ? '语法句子缺陷篇' : '篇章文体篇');
            catNode.innerHTML = `<i class="fa-solid fa-folder-open"></i> ${catName}`;
            indexNode.textContent = `题目 ${currentIndex + 1} / ${filteredQuestions.length}`;
            textNode.textContent = currentQuestion.question;
        }

        function handleAnswer(userSelectTrue) {
            if (hasAnswered) return;
            hasAnswered = true;

            StorageEngine.saveProgress('tf', currentQuestion.id);
            const isCorrect = (userSelectTrue === currentQuestion.isCorrect);

            btnTrue.classList.add('disabled');
            btnFalse.classList.add('disabled');

            if (currentQuestion.isCorrect) {
                btnTrue.classList.add('selected-true-correct');
                if (!userSelectTrue) btnFalse.classList.add('selected-wrong');
            } else {
                btnFalse.classList.add('selected-false-correct');
                if (userSelectTrue) btnTrue.classList.add('selected-wrong');
            }

            if (!isCorrect) {
                StorageEngine.addMistake('tf', currentQuestion);
            }

            // 选择完成后，才在此处同步将提示大标签、翻译、秒杀逻辑亮出来
            cardAlert.innerHTML = `<i class="fa-solid fa-id-card"></i> <strong>提分记忆点：</strong>${currentQuestion.card_map}`;
            cardAlert.style.display = 'block';

            analysisText.innerHTML = `<strong>中文全译：</strong>${currentQuestion.question_zh}`;
            analysisHook.innerHTML = `<i class="fa-solid fa-key"></i> <strong>秒杀逻辑：</strong>${currentQuestion.hook}`;
            analysisContainer.style.display = 'block';
            btnNext.style.visibility = 'visible';
        }

        btnTrue.onclick = () => handleAnswer(true);
        btnFalse.onclick = () => handleAnswer(false);

        btnNext.onclick = () => {
            currentIndex++;
            if (currentIndex < filteredQuestions.length) {
                loadQuestion();
            } else {
                alert('恭喜你，当前判断题通关成功！');
                window.location.href = '../index.html';
            }
        };

        window.onload = loadQuestion;
    </script>
</body>
</html>
